version: "3.9"

# =============================================================================
# Spade & Scale — Docker Compose
# Orchestrates: FastAPI backend, Next.js frontend, and a local Supabase stack
# (for local dev). In production, point to cloud Supabase instead.
# =============================================================================

networks:
  spade-network:
    driver: bridge

volumes:
  postgres_data:
  supabase_storage:

services:

  # ---------------------------------------------------------------------------
  # 🗄️  PostgreSQL — Supabase's underlying database (local dev only)
  # ---------------------------------------------------------------------------
  postgres:
    image: supabase/postgres:15.1.0.117
    container_name: spade_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your-super-secret-password}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d  # auto-run migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spade-network

  # ---------------------------------------------------------------------------
  # 🔑  Supabase Auth (GoTrue) — Handles JWTs, email/social logins
  # ---------------------------------------------------------------------------
  supabase-auth:
    image: supabase/gotrue:v2.151.0
    container_name: spade_auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your-super-secret-password}@postgres:5432/${POSTGRES_DB:-postgres}?search_path=auth&sslmode=disable"
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-min-32-chars}
      GOTRUE_MAILER_AUTOCONFIRM: "true"  # Disable email confirmation for local dev
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: "Spade & Scale"
      GOTRUE_MAILER_URLPATHS_INVITE: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
    networks:
      - spade-network

  # ---------------------------------------------------------------------------
  # 🔌  Supabase REST (PostgREST) — Auto-generates REST API from Postgres schema
  # ---------------------------------------------------------------------------
  supabase-rest:
    image: postgrest/postgrest:v12.0.2
    container_name: spade_rest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your-super-secret-password}@postgres:5432/${POSTGRES_DB:-postgres}"
      PGRST_DB_SCHEMAS: "public,storage,graphql_public"
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-min-32-chars}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-min-32-chars}
      PGRST_APP_SETTINGS_JWT_EXP: "3600"
    networks:
      - spade-network

  # ---------------------------------------------------------------------------
  # 🐍  FastAPI Backend — Core API server with business logic
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spade_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # App
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

      # Supabase connection
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-rest:3000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-your-service-role-key}
      SUPABASE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-min-32-chars}

      # Direct DB connection (for sqlalchemy if needed)
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-your-super-secret-password}@postgres:5432/${POSTGRES_DB:-postgres}"
    volumes:
      - ./backend:/app   # hot-reload in development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spade-network

  # ---------------------------------------------------------------------------
  # ⚛️  Next.js Frontend — React app with Supabase Auth + FastAPI integration
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:9999}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-your-anon-key}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: spade_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:9999}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-your-anon-key}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend/src:/app/src         # hot-reload source files
      - ./frontend/public:/app/public
    networks:
      - spade-network
